<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | WatchMarket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <div class="login-image">
        <div class="brand-overlay">
            <h1>Saatinden</h1>
            <p>The marketplace for horology enthusiasts.</p>
        </div>
    </div>

    <div class="login-form-section">
        <div class="form-wrapper">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to your account to track orders and manage your collection.</p>

            <form action="#" method="POST">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <div class="label-flex">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Keep me signed in</label>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="divider">
                <span>New to ChronosHub?</span>
            </div>

            <button class="btn-secondary">Create your account</button>
        </div>
    </div>
</div>

</body>
</html>
